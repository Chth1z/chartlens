version: "0.2.0"
fields:
  - key: gender
    label: 性别
    export_header: 性别(男1，女2)
    type: enum
    allowed_codes: ["1", "2", unknown]
    extract_mode: rule_first
    source_sections: [基本信息, 入院记录, 病案首页]
    synonyms: [性别, 男, 女]
    evidence_priority: [基本信息, 入院记录, 病案首页]
    rule_strategy:
      kind: regex
      pattern: "(?:性别\\s*[:：]?\\s*)?(男|女)"
      value_map: {男: "1", 女: "2"}
    review_policy: required_if_missing
    max_evidence_items: 4
    evidence_window_chars: 220
    llm:
      enabled: false
      trigger_statuses: [missing]
      evidence_budget: 300
      prompt_profile: demographics

  - key: age
    label: 年龄
    export_header: 年龄
    type: number
    allowed_codes: [integer, unknown]
    extract_mode: rule_first
    source_sections: [基本信息, 入院记录, 病案首页]
    synonyms: [年龄, 岁]
    evidence_priority: [基本信息, 入院记录, 病案首页]
    rule_strategy:
      kind: regex
      pattern: "(\\d{1,3})\\s*岁"
      numeric_min: 0
      numeric_max: 120
    review_policy: required_if_missing
    max_evidence_items: 4
    evidence_window_chars: 220
    llm:
      enabled: true
      trigger_statuses: [missing, low_confidence]
      evidence_budget: 450
      prompt_profile: demographics

  - key: hospital
    label: 医院
    export_header: 医院
    type: string
    allowed_codes: [text, unknown]
    extract_mode: rule_first
    source_sections: [基本信息, 入院记录, 病案首页]
    synonyms: [医院, 医学院, 附属医院]
    evidence_priority: [病案首页, 入院记录]
    rule_strategy:
      kind: regex
      pattern: "([\\u4e00-\\u9fffA-Za-z0-9（）()·\\-]{2,40}医院)"
    review_policy: required_if_missing
    max_evidence_items: 5
    evidence_window_chars: 260
    llm:
      enabled: true
      trigger_statuses: [missing, low_confidence]
      evidence_budget: 550
      allow_image_crop: true
      prompt_profile: hospital_lookup

  - key: urban_status
    label: 是否城市
    export_header: 是否城市（1非城市2城市）
    type: enum
    allowed_codes: ["1", "2", unknown]
    extract_mode: manual
    synonyms: [城市, 农村, 城镇, 住址]
    evidence_priority: [病案首页, 基本信息]
    rule_strategy:
      kind: mapping
      mapping:
        "2": [市区, 城市, 太原市, 北京市, 上海市, 广州市, 深圳市, 天津市, 重庆市]
        "1": [农村, 村, 乡, 镇, 县]
    llm:
      enabled: false
      trigger_statuses: [missing]
      evidence_budget: 300
    phase: 2

  - key: hypertension_history
    label: 高血压病史
    export_header: 高血病史（有1，无0，不详）
    type: enum
    allowed_codes: ["1", "0", unknown]
    extract_mode: rule_first
    source_sections: [既往史, 病史, 入院记录, 出院诊断]
    synonyms: [高血压, 高血压病, 血压升高]
    negation_terms: [否认, 无, 未见, 不详]
    evidence_priority: [既往史, 病史, 入院记录]
    rule_strategy:
      kind: history
      positive_patterns: [高血压, 高血压病, 血压升高]
      negative_patterns: [否认高血压, 无高血压, 未见高血压]
      unknown_patterns: [高血压病史不详, 高血压不详]
    review_policy: always_if_conflict
    max_evidence_items: 5
    evidence_window_chars: 300
    llm:
      enabled: true
      trigger_statuses: [missing, conflict, needs_review]
      evidence_budget: 650
      prompt_profile: history

