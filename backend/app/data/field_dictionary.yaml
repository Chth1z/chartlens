    type: string
    allowed_codes: ["1", "2", "3", "4", "5", unknown]
    extract_mode: manual
    synonyms: [Hunt-Hess, HH, Hunt Hess]
    evidence_priority: [入院记录, 评分]
    rule_strategy:
      kind: regex
      pattern: "(?:HH|Hunt[-\\s]?Hess)\\s*[分级评分]*\\s*[:：]?\\s*([0-5ⅠⅡⅢⅣⅤ]+)"
    llm:
      enabled: false
      trigger_statuses: [missing]
      evidence_budget: 600
    phase: 2

