profile_id: mock_general
label: 通用合成中文住院病例评测基线
schema_id: medical_inpatient_zh
# Synthetic, fully de-identified short Chinese inpatient narratives that
# exercise the rule-driven shortcut path of ConservativeLocalProvider.
# Fixtures live next to this YAML under fixtures/mock_general/<case_id>.txt.
# Bootstrap them through scripts/bootstrap-eval-fixtures.py before running
# scripts/run-extraction-eval.ps1.
field_tags:
  gender: [demographics]
  age: [demographics]
  hospital: [demographics]
  urban_residence: [demographics]
  hypertension_history: [history, chronic_disease]
  diabetes_history: [history, chronic_disease]
  hyperlipidemia_history: [history, chronic_disease]
  heart_disease_history: [history, chronic_disease]
  stroke_history: [history, chronic_disease]
  tumor_history: [history, chronic_disease]
  smoking_history: [lifestyle]
  drinking_history: [lifestyle]
  single_multiple: [aneurysm]
  aneurysm_location: [aneurysm]
  hh_grade: [score]
  wfns_grade: [score]
  fisher_grade: [score]
  mrs_score: [score]
  surgery_method: [surgery]
  onset_to_admission_time: [timeline]
  admission_to_surgery_time: [timeline]
  in_hospital_death: [discharge]
  transfer: [discharge]
thresholds:
  auto_accept_precision: 0.95
  evidence_coverage: 1.0
  unknown_misfill_rate: 0.0
token_budget:
  max_input_tokens_per_case: 1200
  max_input_tokens_per_accepted_field: 500
gold_cases:
  - case_id: eval-mock-001
    tags: [demographics, history_negative, lifestyle_mixed]
    gold:
      gender: "1"
      age: "66"
      hypertension_history: "0"
      diabetes_history: "0"
      smoking_history: "1"
      drinking_history: "0"
  - case_id: eval-mock-002
    tags: [demographics, history_positive, lifestyle_negative]
    gold:
      gender: "2"
      age: "54"
      hypertension_history: "1"
      diabetes_history: "0"
      hyperlipidemia_history: "0"
      smoking_history: "0"
      drinking_history: "0"
  - case_id: eval-mock-003
    tags: [demographics, history_positive, lifestyle_positive]
    gold:
      gender: "1"
      age: "72"
      diabetes_history: "1"
      hyperlipidemia_history: "1"
      smoking_history: "1"
      drinking_history: "1"
  - case_id: eval-mock-004
    tags: [demographics, history_all_negative, lifestyle_negative]
    gold:
      gender: "2"
      age: "38"
      hypertension_history: "0"
      diabetes_history: "0"
      hyperlipidemia_history: "0"
      smoking_history: "0"
      drinking_history: "0"
  - case_id: eval-mock-005
    tags: [demographics, history_mixed, lifestyle_positive, hospital_unknown, urban_residence_unknown]
    gold:
      gender: "1"
      age: "48"
      hospital: unknown
      urban_residence: unknown
      hypertension_history: "1"
      diabetes_history: "0"
      smoking_history: "1"
      drinking_history: "1"
  - case_id: eval-mock-006
    tags: [demographics, heart_disease_positive, stroke_positive, history_mixed, lifestyle_mixed]
    gold:
      gender: "1"
      age: "60"
      heart_disease_history: "1"
      stroke_history: "1"
      hypertension_history: "0"
      diabetes_history: "0"
      smoking_history: "1"
      drinking_history: "0"
  - case_id: eval-mock-007
    tags: [demographics, history_implicit_negative, family_history_present, lifestyle_negative]
    gold:
      gender: "2"
      age: "45"
      hypertension_history: "0"
      diabetes_history: "0"
      heart_disease_history: "0"
      stroke_history: "0"
      tumor_history: "0"
      smoking_history: "0"
      drinking_history: "0"
  - case_id: eval-mock-008
    # Challenge case: real-world phrasings that miss the schema synonym list.
    # '血压偏高' is medically equivalent to 高血压 but is not in the
    # hypertension_history synonyms; '嗜酒' is medically equivalent to 饮酒
    # but is not in drinking_history synonyms. Diabetes uses the standard
    # word and serves as a control. Smoking is explicitly negated.
    # The gold therefore reflects the human-correct answer, not what the
    # current rule path can recover. Failures here are real recall gaps and
    # are the targets of the remaining E1-005 / E1-001 work.
    tags: [demographics, history_synonym_gap, lifestyle_synonym_gap]
    gold:
      gender: "1"
      age: "57"
      hypertension_history: "1"
      diabetes_history: "1"
      smoking_history: "0"
      drinking_history: "1"
  - case_id: eval-mock-009
    # Phase A coverage case: explicit hospital label inside 入院记录, urban
    # address inside 基本信息. The pre_redaction_derivations rule for
    # urban_residence must fire on the address before deidentification and
    # produce a safe `是否城市判定：城市` derivation block; the rule path
    # for hospital must match the `医院: XXX医院` label.
    tags: [demographics, hospital_present, urban_residence_urban, history_mixed, lifestyle_positive]
    gold:
      gender: "1"
      age: "62"
      hospital: 海安市第三人民医院
      urban_residence: "2"
      hypertension_history: "1"
      diabetes_history: "0"
      smoking_history: "1"
      drinking_history: "0"
  - case_id: eval-mock-010
    # Phase A coverage case: rural address (`乡 / 村`) plus a different
    # hospital name. Verifies that the rural branch of the pre-redaction
    # derivation fires and produces `是否城市判定：非城市`, and that the
    # rule path for hospital still matches even when the patient lives in
    # a non-urban area.
    tags: [demographics, hospital_present, urban_residence_rural, history_negative, lifestyle_negative]
    gold:
      gender: "2"
      age: "50"
      hospital: 海安县中医院
      urban_residence: "1"
      hypertension_history: "0"
      diabetes_history: "0"
      smoking_history: "0"
      drinking_history: "0"
  - case_id: eval-mock-011
    # Phase B coverage case: explicit positive tumor history (`恶性肿瘤病史`).
    # Verifies that the rule path matches the `肿瘤` synonym in the
    # `既往史` section and produces `tumor_history="1"`. Also exercises
    # explicit-negative hypertension/diabetes via `否认...病史` clause.
    tags: [demographics, tumor_history_positive, history_mixed, lifestyle_mixed]
    gold:
      gender: "1"
      age: "58"
      tumor_history: "1"
      hypertension_history: "0"
      diabetes_history: "0"
      smoking_history: "1"
      drinking_history: "0"
  - case_id: eval-mock-012
    # Phase C coverage case: single aneurysm at internal carotid artery.
    # Verifies that the rule path matches `单发动脉瘤` → single and
    # `颈内动脉` → code "1" through `_extract_fact_then_code` code_map.
    tags: [demographics, aneurysm_single, aneurysm_location_1, history_mixed, lifestyle_negative]
    gold:
      gender: "1"
      age: "55"
      hypertension_history: "1"
      diabetes_history: "0"
      smoking_history: "0"
      drinking_history: "0"
      single_multiple: "single"
      aneurysm_location: "1"
  - case_id: eval-mock-013
    # Phase C coverage case: multiple aneurysms at posterior circulation.
    # Verifies that the rule path matches `多发动脉瘤` → multiple and
    # `基底动脉` / `椎动脉` → code "4" through `_extract_fact_then_code`
    # code_map.
    tags: [demographics, aneurysm_multiple, aneurysm_location_4, history_mixed, lifestyle_negative]
    gold:
      gender: "2"
      age: "63"
      hypertension_history: "1"
      diabetes_history: "0"
      smoking_history: "0"
      drinking_history: "0"
      single_multiple: "multiple"
      aneurysm_location: "4"
  - case_id: eval-mock-014
    # Phase D coverage case: clean score grades with Hunt-Hess/WFNS/Fisher/mRS.
    # Uses the standard `Hunt-Hess分级Ⅱ级` / `WFNS分级Ⅱ级` / `Fisher分级3级` /
    # `mRS评分1分` patterns that the rule regex matches directly.
    tags: [demographics, score_all_present, history_mixed, lifestyle_negative]
    gold:
      gender: "2"
      age: "52"
      hypertension_history: "1"
      diabetes_history: "0"
      smoking_history: "0"
      drinking_history: "0"
      hh_grade: "2"
      wfns_grade: "2"
      fisher_grade: "3"
      mrs_score: "1"
  - case_id: eval-mock-015
    # Phase D coverage case: Roman numeral scores (HH Ⅲ级, WFNS Ⅲ级) plus
    # Arabic Fisher 4级 and mRS 4分. Tests the Roman→Arabic conversion in
    # `_extract_recorded_score`.
    tags: [demographics, score_roman_numeral, history_positive, lifestyle_positive]
    gold:
      gender: "1"
      age: "68"
      hypertension_history: "1"
      diabetes_history: "1"
      smoking_history: "1"
      drinking_history: "1"
      hh_grade: "3"
      wfns_grade: "3"
      fisher_grade: "4"
      mrs_score: "4"
  - case_id: eval-mock-016
    # Phase D coverage case: no score grades present (unruptured aneurysm,
    # elective surgery). All score fields should remain unknown. Validates
    # that the rule path does not hallucinate scores from unrelated text.
    tags: [demographics, score_all_unknown, history_negative, lifestyle_mixed]
    gold:
      gender: "1"
      age: "45"
      hypertension_history: "0"
      diabetes_history: "0"
      smoking_history: "0"
      drinking_history: "1"
      hh_grade: unknown
      wfns_grade: unknown
      fisher_grade: unknown
      mrs_score: unknown
  - case_id: eval-mock-017
    # Phase E+F+G coverage case: surgery (介入栓塞术), onset-to-admission
    # (3小时), admission-to-surgery (2天), discharge (好转, 未转诊).
    tags: [demographics, surgery_present, timeline_present, discharge_alive, history_mixed, lifestyle_negative]
    gold:
      gender: "2"
      age: "58"
      hypertension_history: "1"
      diabetes_history: "0"
      smoking_history: "0"
      drinking_history: "0"
      surgery_method: "介入栓塞术"
      onset_to_admission_time: "3小时"
      admission_to_surgery_time: "2天"
      in_hospital_death: "0"
      transfer: "0"
  - case_id: eval-mock-018
    # Phase E+F+G coverage case: surgery (开颅夹闭术), onset-to-admission
    # (2天), admission-to-surgery (3天), discharge (死亡).
    tags: [demographics, surgery_present, timeline_present, discharge_death, history_positive, lifestyle_positive]
    gold:
      gender: "1"
      age: "72"
      hypertension_history: "1"
      diabetes_history: "1"
      smoking_history: "1"
      drinking_history: "1"
      surgery_method: "开颅夹闭术"
      onset_to_admission_time: "2天"
      admission_to_surgery_time: "3天"
      in_hospital_death: "1"
      transfer: "0"
  - case_id: eval-mock-019
    # Phase E+F+G coverage case: conservative treatment (保守治疗),
    # onset-to-admission (1周), no surgery (admission_to_surgery unknown),
    # discharge (好转, 转上级医院).
    tags: [demographics, surgery_conservative, timeline_present, discharge_transfer, history_negative, lifestyle_negative]
    gold:
      gender: "2"
      age: "65"
      hypertension_history: "0"
      diabetes_history: "0"
      smoking_history: "0"
      drinking_history: "0"
      surgery_method: "保守治疗"
      onset_to_admission_time: "1周"
      admission_to_surgery_time: unknown
      in_hospital_death: "0"
      transfer: "1"
