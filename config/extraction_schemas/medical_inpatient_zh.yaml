    evidence_priority: [DSA, CTA, 影像报告, 手术记录]
    code_map:
      single: [单发动脉瘤, 单发]
      multiple: [多发动脉瘤, 多个动脉瘤, 多发]
  - key: aneurysm_location
    field_group_key: aneurysm_group
    label: 动脉瘤位置
    export_header: 动脉瘤位置（1.颈内，2.中，3.前，4后循环）
    type: enum
    allowed_codes: ["1", "2", "3", "4", unknown]
    extract_mode: fact_then_code
    source_sections: [辅助检查, 影像报告, CTA, DSA, 手术记录, 出院诊断]
    synonyms: [颈内动脉, 大脑中动脉, 前交通, 大脑前动脉, 后交通, 椎动脉, 基底动脉, 小脑后下动脉]
