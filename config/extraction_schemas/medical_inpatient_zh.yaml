schema_id: medical_inpatient_zh
version: "1.1.0"
label: 中文住院病例抽取 schema
extraction_strategy: evidence_first_multimodal
remote_exposure_policy:
  allow_full_document_context: false
  allow_page_images: false
  allow_raw_block_text: false
  allow_safe_evidence_candidates: true
  max_evidence_chars_per_field: 1200
field_groups:
  - key: demographics_group
    label: 基本信息
    source_sections: [基本信息, 入院记录, 病案首页, 病程记录, 手术记录, 出院记录]
    prompt_profile: demographics
    semantic_strategy: rule_shortcut
    max_context_chars: 1600
  - key: history_group
    label: 病史与生活习惯
    source_sections: [既往史, 个人史, 生活史, 病史, 入院记录, 首次病程记录, 病程记录, 出院诊断]
    prompt_profile: clinical_history
    semantic_strategy: llm_semantic
    max_context_chars: 3600
  - key: aneurysm_group
    label: 动脉瘤影像事实
    source_sections: [辅助检查, 影像报告, CTA, DSA, 手术记录, 出院诊断]
    prompt_profile: aneurysm_facts
    semantic_strategy: llm_facts_then_compute
    max_context_chars: 4200
  - key: surgery_group
    label: 手术与治疗事件
    source_sections: [手术记录, 手术日期, 术前诊断, 术中诊断, 手术名称, 手术经过, 出院记录, 出院诊断, 医嘱]
    prompt_profile: surgery_events
    semantic_strategy: llm_facts_then_compute
    max_context_chars: 3600
  - key: discharge_group
    label: 出院结局
    source_sections: [出院记录, 出院情况, 病案首页, 出院诊断]
    prompt_profile: discharge
    semantic_strategy: llm_semantic
    max_context_chars: 2600
  - key: score_group
    label: 评分中间事实
    source_sections: [入院记录, 现病史, 体格检查, 辅助检查, 影像报告, 出院记录, 随访]
    prompt_profile: score_facts
    semantic_strategy: llm_facts_then_compute
    max_context_chars: 3600
  - key: timeline_group
    label: 入院与手术时间
    source_sections: [现病史, 入院记录, 急诊记录, 首次病程记录, 病程记录, 手术记录, 手术经过, 出院记录]
    prompt_profile: timeline
    semantic_strategy: rule_shortcut
    max_context_chars: 2400
fields:
  - key: gender
    field_group_key: demographics_group
    label: 性别
    export_header: 性别(男1，女2)
    type: enum
    allowed_codes: ["1", "2", unknown]
    extract_mode: rule_first
    source_sections: [基本信息, 入院记录, 病案首页, 病程记录, 手术记录, 出院记录]
    synonyms: [性别, 男, 女]
    evidence_priority: [基本信息, 入院记录, 病案首页]
    rule_patterns:
      - pattern: '(?:性别|性\s*别)\s*[:：]?\s*(男|女)'
        code_map: {男: "1", 女: "2"}
        confidence: 0.96
        summary: 明确性别标签证据命中
      - pattern: '(?:患者|病人)[，,]?\s*(男|女)[，,]\s*\d{1,3}\s*岁'
        code_map: {男: "1", 女: "2"}
        confidence: 0.94
        summary: 患者人口学行证据命中
    evidence_policy:
      allowed_evidence_sources: [layout_key_value, ocr_text, layout_cell, form_field, image]
      forbidden_document_regions: [signature, document_footer]
      forbidden_inference_sources: [name_inference, diagnosis_inference, department_inference, medication_inference, family_context]
      source_priority: [layout_key_value, layout_cell, form_field, patient_header, institution_header, clinical_body, 病案首页, 基本信息, 入院记录, 页眉, 病程记录, 手术记录, 出院记录, ocr_text, image]
      conflict_policy: review_conflict
      implicit_negative_policy: none
      require_visual_confirmation: false
      pass_criteria: [explicit_gender_label, patient_demographics_region, no_conflict, no_forbidden_inference]
      high_risk: true
    llm:
      enabled: false
      evidence_budget: 300
      prompt_profile: demographics
  - key: age
    field_group_key: demographics_group
    label: 年龄
    export_header: 年龄
    type: number
    allowed_codes: [integer, unknown]
    extract_mode: rule_first
    source_sections: [基本信息, 入院记录, 病案首页, 病程记录, 手术记录, 出院记录]
    synonyms: [年龄, 岁]
    evidence_priority: [基本信息, 入院记录, 病案首页]
    rule_patterns:
      - pattern: '年龄\s*[:：]?\s*(\d{1,3})\s*(?:岁)?'
        confidence: 0.96
        summary: 年龄配置模式命中
      - pattern: '患者[，,]\s*(?:男|女)[，,]\s*(\d{1,3})\s*岁'
        confidence: 0.96
        summary: 年龄配置模式命中
    evidence_policy:
      allowed_evidence_sources: [layout_key_value, ocr_text, layout_cell, form_field, image]
      forbidden_document_regions: [signature, document_footer]
      forbidden_inference_sources: [name_inference, diagnosis_inference, department_inference, family_context]
      source_priority: [layout_key_value, layout_cell, form_field, patient_header, institution_header, clinical_body, 病案首页, 基本信息, 入院记录, 页眉, 病程记录, 手术记录, 出院记录, ocr_text, image]
      conflict_policy: review_conflict
      implicit_negative_policy: none
      require_visual_confirmation: false
      pass_criteria: [explicit_age_label, patient_demographics_region, no_conflict]
      high_risk: true
    llm:
      enabled: true
      evidence_budget: 450
      prompt_profile: demographics
  - key: hospital
    field_group_key: demographics_group
    label: 医院
    export_header: 医院
    type: string
    allowed_codes: [text, unknown]
    extract_mode: rule_first
    source_sections: [基本信息, 入院记录, 病案首页, 病程记录, 手术记录, 出院记录]
    synonyms: [医院, 医学院, 附属医院]
    evidence_priority: [病案首页, 入院记录]
    rule_patterns:
      - pattern: '(?:医院|医疗机构|就诊医院)\s*[:：]\s*([\u4e00-\u9fffA-Za-z0-9（）()·\-]{2,50}医院)'
        confidence: 0.88
        summary: 明确医院标签证据命中
      - pattern: '^([\u4e00-\u9fffA-Za-z0-9（）()·\-]{4,50}医院)\s*$'
        confidence: 0.84
        summary: 页眉医院名称证据命中
    evidence_policy:
      allowed_evidence_sources: [layout_key_value, ocr_text, layout_cell, form_field, image]
      forbidden_document_regions: [signature, document_footer]
      forbidden_inference_sources: [generic_hospital_word, visit_phrase_inference]
      source_priority: [layout_key_value, institution_header, patient_header, 病案首页, 页眉, 基本信息, 入院记录, ocr_text, image]
      conflict_policy: review_conflict
      implicit_negative_policy: none
      require_visual_confirmation: false
      pass_criteria: [explicit_hospital_label_or_header, no_generic_phrase, no_conflict]
      high_risk: true
    llm:
      enabled: true
      evidence_budget: 550
      prompt_profile: demographics
  - key: urban_residence
    field_group_key: demographics_group
    label: 是否城市
    export_header: 是否城市（1非城市2城市）
    type: enum
    allowed_codes: ["1", "2", unknown]
    extract_mode: rule_first
    source_sections: [基本信息, 入院记录, 病案首页, 一般资料]
    synonyms: [是否城市, 城市, 非城市, 城镇, 农村, 户籍, 居住地, 现住址, 家庭住址]
    evidence_priority: [病案首页, 基本信息, 一般资料, 入院记录]
    rule_patterns:
      - pattern: '是否城市\s*[（(]?\s*1\s*非城市\s*2\s*城市\s*[）)]?\s*[:：]?\s*([12])'
        confidence: 0.96
        summary: 显式是否城市编码命中
      - pattern: '(?:是否城市|城乡|户籍类型|居住地类型)\s*[:：]?\s*(城市|城镇|非城市|农村)'
        code_map: {城市: "2", 城镇: "2", 非城市: "1", 农村: "1"}
        confidence: 0.94
        summary: 显式城乡类型命中
      - pattern: '是否城市判定[:：](非城市|城市)'
        code_map: {非城市: "1", 城市: "2"}
        confidence: 0.96
        summary: 脱敏前本地地址派生命中
    pre_redaction_derivations:
      - normalized_code: "1"
        source_patterns:
          - '(?:现住|住址|家庭住址|户籍|居住地|地址|家住|居住在|住在)[^，,；;\s。]{0,60}(?:农村|乡|村)'
        source_terms: [农村户籍, 农村居民, 农村]
        safe_text: 是否城市判定：非城市
        safe_evidence_span: 是否城市判定：非城市
        confidence: 0.96
        summary: 本地地址线索指向非城市
      - normalized_code: "2"
        source_patterns:
          - '(?:现住|住址|家庭住址|户籍|居住地|地址|家住|居住在|住在)[^，,；;\s。]{0,60}(?:市区|街道|社区|小区|大道|路|科技园|工业园|城镇|城市)'
          - '(?:现住|住址|家庭住址|户籍|居住地|地址|家住|居住在|住在)[^，,；;\s。]{0,60}市[^，,；;\s。]{0,30}(?:区|街道|社区|小区|大道|路|园)'
        source_terms: [城市户籍, 城镇户籍, 城镇居民]
        safe_text: 是否城市判定：城市
        safe_evidence_span: 是否城市判定：城市
        confidence: 0.96
        summary: 本地地址线索指向城市
    llm:
      enabled: false
      evidence_budget: 300
      prompt_profile: demographics
  - key: hypertension_history
    field_group_key: history_group
    label: 高血压病史
    export_header: 高血压病史（有1，无0，不详）
    type: enum
    allowed_codes: ["1", "0", unknown]
    extract_mode: llm_semantic
    source_sections: [既往史, 病史, 入院记录, 出院诊断]
    excluded_sections: [家族史, 婚育史]
    synonyms: [高血压, 高血压病, 血压升高, 血压偏高, 血压增高, 血压高, BP高]
    negation_terms: [否认, 无, 未见]
    evidence_priority: [既往史, 病史, 入院记录]
    evidence_policy:
      allowed_evidence_sources: [ocr_text, layout_cell, form_field, implicit_negative, image]
      forbidden_inference_sources: [family_context, uncertain_diagnosis]
      source_priority: [既往史, 病史, 入院记录, layout_cell, form_field, ocr_text, implicit_negative]
      conflict_policy: review_conflict
      implicit_negative_policy: section_complete_only
      require_visual_confirmation: false
      pass_criteria: [explicit_positive_or_negative, patient_history_context, no_conflict]
      high_risk: true
  - key: diabetes_history
