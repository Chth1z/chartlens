    code_map:
      "1": [颈内动脉, 后交通, 海绵窦段]
      "2": [大脑中动脉, 中动脉, MCA]
      "3": [前交通, 大脑前动脉, ACoA, ACA]
      "4": [基底动脉, 椎动脉, 后循环, 小脑后下动脉, PICA, SCA, PCA]
