  - key: onset_to_admission_time
    field_group_key: timeline_group
    label: 出现症状到入院前时间
    export_header: 出现症状到入院前时间
    type: duration
    allowed_codes: [duration, unknown]
    extract_mode: rule_first
    source_sections: [现病史, 入院记录, 急诊记录, 首次病程记录, 病程记录]
    synonyms: [发病, 起病, 突发, 出现症状, 主因, 服药, 服毒, 误服, 口服, 查体发现, 头痛, 头晕, 入院, 就诊]
    evidence_priority: [现病史, 入院记录, 急诊记录, 首次病程记录, 病程记录]
    rule_patterns:
      - pattern: '((?:主因|因|以|患者因|患者主因)[^。；;\n]{0,40}?(\d+(?:\.\d+)?\s*(?:小时|h|H|天|日|d|D|周|月))[^。；;\n]{0,50}?(?:入院|收入院|收住院|就诊|来院))'
        raw_group: 2
        evidence_group: 1
        confidence: 0.96
        summary: 主因到入院明确间隔命中
      - pattern: '((?:服药|服毒|误服|口服|服用)[^。；;\n]{0,30}?(?:后|约)?(\d+(?:\.\d+)?\s*(?:小时|h|H|天|日|d|D|周|月))[^。；;\n]{0,50}?(?:入院|收入院|收住院|就诊|来院))'
        raw_group: 2
        evidence_group: 1
        confidence: 0.96
        summary: 服药或服毒到入院明确间隔命中
      - pattern: '((?:查体发现|发现|查出)[^。；;\n]{0,30}?(\d+(?:\.\d+)?\s*(?:小时|h|H|天|日|d|D|周|月))[^。；;\n]{0,50}?(?:入院|收入院|收住院|就诊|来院))'
        raw_group: 2
        evidence_group: 1
        confidence: 0.95
        summary: 查体发现到入院明确间隔命中
      - pattern: '((?:发病|起病|突发[^，,；;\s。]{0,12}|出现[^，,；;\s。]{0,12})(\d+(?:\.\d+)?\s*(?:小时|h|H|天|日|d|D|周|月))后(?:入院|就诊|来院))'
        raw_group: 2
        evidence_group: 1
        confidence: 0.97
        summary: 发病到入院明确间隔命中
      - pattern: '((?:入院|就诊|来院)前(\d+(?:\.\d+)?\s*(?:小时|h|H|天|日|d|D|周|月))(?:发病|起病|突发|出现症状))'
        raw_group: 2
        evidence_group: 1
        confidence: 0.9
        summary: 入院前发病间隔命中
      - pattern: '([^，,；;\s。]{0,16}(\d+(?:\.\d+)?\s*(?:小时|h|H|天|日|d|D|周|月))[^。；;\n]{0,40}(?:入院|就诊|来院))'
        raw_group: 2
        evidence_group: 1
        confidence: 0.88
        summary: 症状持续到入院间隔命中
      - pattern: '([^，,；;\s。]{0,12}后(\d+(?:\.\d+)?\s*(?:小时|h|H|天|日|d|D|周|月))(?:入院|就诊|来院))'
        raw_group: 2
        evidence_group: 1
        confidence: 0.88
        summary: 事件后入院间隔命中
    llm:
      enabled: false
      evidence_budget: 600
      prompt_profile: timeline
