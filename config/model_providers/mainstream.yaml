providers:
  - provider_id: openai
    label: OpenAI
    description: OpenAI Responses API with optional OpenAI-compatible proxy mode.
    api: openai-responses
    api_options:
      - openai-responses
      - openai-completions
    default_base_url: https://api.openai.com/v1
    auth_env_vars:
      - EYEX_OPENAI_API_KEY
      - OPENAI_API_KEY
    base_url_editable: true
    default_models:
      - id: gpt-5.4
        name: GPT-5.4
        context_window: 400000
        max_tokens: 4096
      - id: gpt-5.4-mini
        name: GPT-5.4 Mini
        context_window: 400000
        max_tokens: 4096
      - id: gpt-5.5
        name: GPT-5.5
        context_window: 400000
        max_tokens: 4096
    option_schema:
      reasoning_effort: [minimal, low, medium, high, xhigh]
      max_output_tokens:
        min: 256
        max: 8192
        step: 256

  - provider_id: deepseek
    label: DeepSeek
    description: DeepSeek OpenAI-compatible chat completions.
    api: openai-completions
    default_base_url: https://api.deepseek.com
    auth_env_vars:
      - EYEX_DEEPSEEK_API_KEY
      - DEEPSEEK_API_KEY
    default_models:
      - id: deepseek-v4-flash
        name: DeepSeek V4 Flash
        context_window: 1000000
        max_tokens: 384000
      - id: deepseek-v4-pro
        name: DeepSeek V4 Pro
        context_window: 1000000
        max_tokens: 384000
    option_schema:
      temperature:
        min: 0
        max: 1
        step: 0.1
      max_output_tokens:
        min: 256
        max: 8192
        step: 256

  - provider_id: anthropic
    label: Anthropic
    description: Claude native Messages API.
    api: anthropic-messages
    default_base_url: https://api.anthropic.com
    auth_env_vars:
      - EYEX_ANTHROPIC_API_KEY
      - ANTHROPIC_API_KEY
    default_models:
      - id: claude-opus-4-6
        name: Claude Opus 4.6
        context_window: 200000
        max_tokens: 4096
      - id: claude-sonnet-4-6
        name: Claude Sonnet 4.6
        context_window: 200000
        max_tokens: 4096
      - id: claude-haiku-4-6
        name: Claude Haiku 4.6
        context_window: 200000
        max_tokens: 4096
    option_schema:
      temperature:
        min: 0
        max: 1
        step: 0.1
      max_output_tokens:
        min: 256
        max: 8192
        step: 256

  - provider_id: google
    label: Google Gemini
    description: Google Gemini native generateContent API.
