profile_id: cuda_paddle
label: NVIDIA CUDA Paddle OCR
version: 1.0.0
page_router:
  - page_kinds: [native_pdf_text, text]
    engines: [pdf_text]
    description: Use embedded text when the PDF page already has enough text.
  - page_kinds: [image, image_ocr, image_pdf_ocr, scan, screenshot]
    engines: [pp_ocr_v5_paddle, paddle_structure_v3, docling, paddleocr_vl]
    description: Use Paddle CUDA OCR engines first on NVIDIA workstations.
  - page_kinds: [table, complex_layout, low_quality, difficult_scan]
    engines: [paddle_structure_v3, paddleocr_vl, pp_ocr_v5_paddle, docling]
    description: Prefer layout-aware Paddle engines for complex pages.
engines:
  - engine_id: pp_ocr_v5_paddle
    label: PP-OCRv5 Paddle CUDA
    model_name: PP-OCRv5
    model_version: v5
    accelerator: cuda
    priority: 10
  - engine_id: paddle_structure_v3
    label: PP-StructureV3 CUDA
    model_name: PP-StructureV3
    accelerator: cuda
    priority: 20
  - engine_id: paddleocr_vl
    label: PaddleOCR-VL-1.5 CUDA
    model_name: PaddleOCR-VL-1.5
    model_version: "1.5"
    accelerator: cuda
    priority: 30
  - engine_id: docling
    label: Docling fallback
    model_name: Docling
    accelerator: cpu
    priority: 40
cache_policy:
  include_engine_id: true
  include_engine_version: true
  include_accelerator: true
gpu_policy:
  target: nvidia_cuda
  default_accelerator: cuda
  rocm_default_enabled: false
  unofficial_gpu_overrides: false
quality_thresholds:
  min_chars: 80
  min_confidence: 0.65
