services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: eyes
      POSTGRES_USER: eyes
      POSTGRES_PASSWORD: eyes_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      EYES_DATABASE_URL: postgresql+psycopg://eyes:eyes_dev_password@postgres:5432/eyes
      EYES_REDIS_URL: redis://redis:6379/0
      EYES_STORAGE_DIR: /data/storage
      EYES_OPENAI_API_KEY: ${EYES_OPENAI_API_KEY:-}
      EYES_OPENAI_STANDARD_MODEL: ${EYES_OPENAI_STANDARD_MODEL:-gpt-5.4-mini}
      EYES_OPENAI_THOROUGH_MODEL: ${EYES_OPENAI_THOROUGH_MODEL:-gpt-5.5}
      EYES_OAUTH_ENABLED: ${EYES_OAUTH_ENABLED:-false}
      EYES_OAUTH_CLIENT_ID: ${EYES_OAUTH_CLIENT_ID:-}
      EYES_OAUTH_CLIENT_SECRET: ${EYES_OAUTH_CLIENT_SECRET:-}
      EYES_OAUTH_AUTHORIZATION_URL: ${EYES_OAUTH_AUTHORIZATION_URL:-}
      EYES_OAUTH_TOKEN_URL: ${EYES_OAUTH_TOKEN_URL:-}
      EYES_OAUTH_USERINFO_URL: ${EYES_OAUTH_USERINFO_URL:-}
      EYES_OAUTH_REDIRECT_URI: ${EYES_OAUTH_REDIRECT_URI:-http://127.0.0.1:8000/api/auth/callback}
      EYES_OAUTH_SCOPES: ${EYES_OAUTH_SCOPES:-openid email profile}
      EYES_OAUTH_ALLOWED_EMAIL_DOMAINS: ${EYES_OAUTH_ALLOWED_EMAIL_DOMAINS:-}
      EYES_OAUTH_SESSION_SECRET: ${EYES_OAUTH_SESSION_SECRET:-change-me-for-production}
    ports:
      - "8000:8000"
    volumes:
      - app_storage:/data/storage
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.worker"]
    environment:
      EYES_DATABASE_URL: postgresql+psycopg://eyes:eyes_dev_password@postgres:5432/eyes
      EYES_REDIS_URL: redis://redis:6379/0
      EYES_STORAGE_DIR: /data/storage
      EYES_OPENAI_API_KEY: ${EYES_OPENAI_API_KEY:-}
      EYES_OAUTH_ENABLED: ${EYES_OAUTH_ENABLED:-false}
    volumes:
      - app_storage:/data/storage
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  app_storage:
